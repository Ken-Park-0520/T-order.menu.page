        :root { --brand-color: #800020; }

        body {
            background-color: #0f172a;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            overscroll-behavior-y: none; /* 고무줄 스크롤 현상 방지 */
        }

        #app-shell {
            width: 100%;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: opacity 0.2s ease;
        }

        .auto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            .auto-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #iframe-container { 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; height: 100dvh;
            z-index: 100; display: none; 
            background-color: #fff;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 💡 PDF 뷰어 iframe 스타일 보강: 상단 배너와 겹쳐서 잘리지 않도록 배치 구조 최적화 */
        #content-iframe { 
            width: 100%; 
            height: 100%; 
            flex: 1; 
            border: none; 
            -webkit-overflow-scrolling: touch; 
            display: block;
            box-sizing: border-box;
        }

        /* 💡 PDF 전용 탑 마진 클래스: 배너 높이(56px)만큼 강제로 아래로 밀어줌 */
        .pdf-shift-down {
            margin-top: 56px;
            height: calc(100% - 56px) !important;
        }

        .status-open { background-color: #22c55e; color: white; }
        .status-break { background-color: #f59e0b; color: white; }
        .status-closed { background-color: #ef4444; color: white; }
        .status-off { background-color: #64748b; color: white; }

        .day-tab { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; white-space: nowrap; }
        .day-tab.active { background-color: var(--brand-color); color: white; border-color: var(--brand-color); }

        #digital-clock { font-family: 'JetBrains Mono', monospace; }
        
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 300; opacity: 1; transition: opacity 0.4s;
        }

</head>

    async function init() {
        startClock();
        
        document.getElementById('lang-select').value = window.currentLang;

        window.stores = [...defaultStores];
        render();

        if (!firebaseConfig) {
            setTimeout(hideSpinner, 500);
            return;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        try {
            document.getElementById('loading-text').innerText = "보안 인증 중...";
            let isAuthSuccess = false;
            
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                    isAuthSuccess = true;
                } catch(tokenErr) {
                    console.warn("고객님의 자체 파이어베이스 설정 사용으로 인해 익명 로그인으로 자동 전환합니다.");
                }
            } 
            
            if (!isAuthSuccess) {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error("인증 실패.", e);
            document.getElementById('loading-text').innerHTML = "<span class='text-red-500'>인증 실패 (오프라인 모드)</span>";
            setTimeout(hideSpinner, 5000);
            return;
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            document.getElementById('loading-text').innerText = "데이터 동기화 중...";

            // 💡 데이터 갱신 및 배너 짤림 현상 수정을 위해 'main_v16'으로 버전을 업그레이드했습니다.
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main_v16');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const dbData = docSnap.data().stores;
                    window.stores = dbData.map((s, i) => ({
                        ...s,
                        floor: s.floor !== undefined ? s.floor : (defaultStores[i]?.floor || ''),
                        themeColor: s.themeColor || defaultStores[i]?.themeColor || '#ffffff',
                        urls: s.urls || defaultStores[i]?.urls, 
                        phone: s.phone || defaultStores[i]?.phone || '',
                        rsvUrls: s.rsvUrls || defaultStores[i]?.rsvUrls || makeRsvUrls(),
                        weekly: s.weekly || defaultStores[i]?.weekly 
                    }));
                } else {
                    setDoc(docRef, { stores: window.stores });
                }
                render();
                hideSpinner();
            }, (err) => {
                console.error("파이어베이스 동기화 오류 발생", err);
                hideSpinner();
            });
        });

        window.saveToCloud = async () => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main_v16');
            await setDoc(docRef, { stores: window.stores });
        };
    }

    function hideSpinner() {
        const spinner = document.getElementById('loading-spinner');
        if (spinner) spinner.classList.add('fade-out');
    }

    function startClock() {
        const dateEl = document.getElementById('clock-date');
        const timeEl = document.getElementById('clock-time');
        setInterval(() => {
            const now = new Date();
            const dayIdx = now.getDay();
            
            let dayColor = "text-slate-400";
            if (dayIdx === 0) dayColor = "text-red-500";
            else if (dayIdx === 6) dayColor = "text-blue-500";

            dateEl.innerHTML = `<span class="text-slate-400">${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')}.</span> <span class="${dayColor} font-bold">(${weekDays[dayIdx]})</span>`;
            
            timeEl.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            if (now.getSeconds() === 0) render(); 
        }, 1000);
    }

    function timeToMin(timeStr) {
        if(!timeStr || !timeStr.includes(':')) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getBusinessStatus(store) {
        const t = i18n[window.currentLang]; 
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const nowDay = now.getDay();
        const prevDay = (nowDay + 6) % 7; 

        const todaySched = store.weekly[nowDay];
        const prevSched = store.weekly[prevDay];

        if (prevSched && !prevSched.isOff) {
            const prevSessions = (prevSched.sessions || []).filter(s => s.open !== s.close);
            for (let s of prevSessions) {
                let open = timeToMin(s.open);
                let close = timeToMin(s.close);
                if (close <= open && curMin < close) {
                    const lbl = getLabel(s.label);
                    return { label: t.open, class: "status-open", next: `${lbl ? lbl + ' ' : ''}${s.close} ${t.closeAt}` };
                }
            }
        }

        const getNextOpenText = () => {
            for (let offset = 0; offset <= 7; offset++) {
                let checkDay = (nowDay + offset) % 7;
                let sched = store.weekly[checkDay];
                if (!sched || sched.isOff) continue;
                let validSessions = (sched.sessions || []).filter(s => s.open !== s.close).sort((a, b) => timeToMin(a.open) - timeToMin(b.open));
                
                for (let s of validSessions) {
                    let openMin = timeToMin(s.open);
                    if (offset === 0 && openMin > curMin) {
                        return `${s.open} ${t.openAt}`; 
                    } else if (offset > 0) {
                        let dayPrefix = offset === 1 ? t.tmrw : t.days[checkDay];
                        return `${dayPrefix} ${s.open} ${t.openAt}`; 
                    }
                }
            }
            return t.needSetup;
        };

        if (!todaySched || todaySched.isOff) return { label: t.off, class: "status-off", next: getNextOpenText() };
        
        const sessions = (todaySched.sessions || []).filter(s => s.open !== s.close).sort((a, b) => timeToMin(a.open) - timeToMin(b.open));
        if (sessions.length === 0) return { label: t.noInfo, class: "status-closed", next: t.needSetup };

        for (let i = 0; i < sessions.length; i++) {
            let open = timeToMin(sessions[i].open);
            let close = timeToMin(sessions[i].close);
            let actualClose = close <= open ? close + 1440 : close; 
            
            if (curMin >= open && curMin < actualClose) {
                if (sessions[i].open === '00:00' && sessions[i].close === '24:00') {
                    return { label: t.open, class: "status-open", next: t.hours24 };
                }
                const lbl = getLabel(sessions[i].label);
                return { label: t.open, class: "status-open", next: `${lbl ? lbl + ' ' : ''}${sessions[i].close} ${t.closeAt}` };
            }
        }

        let firstOpen = timeToMin(sessions[0].open);
        if (curMin < firstOpen) {
            return { label: t.ready, class: "status-break", next: `${sessions[0].open} ${t.openAt}` };
        }

        for (let i = 0; i < sessions.length - 1; i++) {
            let currentClose = timeToMin(sessions[i].close);
            let nextOpen = timeToMin(sessions[i+1].open);
            
            if (currentClose <= timeToMin(sessions[i].open)) currentClose += 1440; 
            
            if (curMin >= currentClose && curMin < nextOpen) {
                return { label: t.break, class: "status-break", next: `${sessions[i+1].open} ${t.reopenAt}` };
            }
        }

        return { label: t.closed, class: "status-closed", next: getNextOpenText() };
    }

        document.getElementById('floating-back-btn').classList.add('hidden');
    };

    window.goBack = () => { 
        const iframe = document.getElementById('content-iframe');
        iframe.src = ''; 
        iframe.classList.remove('hidden');
        iframe.classList.remove('pdf-shift-down'); // 💡 뒤로 갈 때 클래스 클리어
        iframe.style.display = 'block'; 
        document.getElementById('custom-store-view').classList.add('hidden');
        document.getElementById('custom-store-view').style.display = 'none';
        
        document.getElementById('iframe-container').style.display = 'none'; 
        
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.width = '';
        document.body.style.backgroundColor = '#0f172a';
        document.body.style.overflow = 'auto'; 
        window.scrollTo(0, window.mainScrollPos);
        document.getElementById('app-shell').style.opacity = '1';
        document.getElementById('app-shell').style.pointerEvents = 'auto'; 

        document.getElementById('viewer-header').style.display = 'flex';
        document.getElementById('floating-back-btn').classList.add('hidden');
    };

    init();
</script>

</body>
</html>
