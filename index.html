    async function init() {
        startClock();
        
        document.getElementById('lang-select').value = window.currentLang;

        window.stores = [...defaultStores];
        render();

        if (!firebaseConfig) {
            setTimeout(hideSpinner, 500);
            return;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        try {
            document.getElementById('loading-text').innerText = "보안 인증 중...";
            let isAuthSuccess = false;
            
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                    isAuthSuccess = true;
                } catch(tokenErr) {
                    console.warn("고객님의 자체 파이어베이스 설정 사용으로 인해 익명 로그인으로 자동 전환합니다.");
                }
            } 
            
            if (!isAuthSuccess) {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error("인증 실패.", e);
            document.getElementById('loading-text').innerHTML = "<span class='text-red-500'>인증 실패 (오프라인 모드)</span>";
            setTimeout(hideSpinner, 5000);
            return;
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            document.getElementById('loading-text').innerText = "데이터 동기화 중...";

            // 💡 데이터 갱신을 위해 'main_v6'으로 버전을 업그레이드했습니다.
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main_v6');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const dbData = docSnap.data().stores;
                    window.stores = dbData.map((s, i) => ({
                        ...s,
                        floor: s.floor || defaultStores[i]?.floor || '',
                        themeColor: s.themeColor || defaultStores[i]?.themeColor || '#ffffff',
                        urls: s.urls || defaultStores[i]?.urls, 
                        phone: s.phone || defaultStores[i]?.phone || '',
                        rsvType: s.rsvType || defaultStores[i]?.rsvType || 'rsv',
                        weekly: s.weekly || defaultStores[i]?.weekly 
                    }));
                } else {
                    setDoc(docRef, { stores: window.stores });
                }
                render();
                hideSpinner();
            }, (err) => {
                console.error("파이어베이스 동기화 오류 발생", err);
                hideSpinner();
            });
        });

        window.saveToCloud = async () => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main_v6');
            await setDoc(docRef, { stores: window.stores });
        };
    }

    function hideSpinner() {
        const spinner = document.getElementById('loading-spinner');
        if (spinner) spinner.classList.add('fade-out');
    }

    function startClock() {
        const dateEl = document.getElementById('clock-date');
        const timeEl = document.getElementById('clock-time');
        setInterval(() => {
            const now = new Date();
            const dayIdx = now.getDay();
            
            let dayColor = "text-slate-400";
            if (dayIdx === 0) dayColor = "text-red-500";
            else if (dayIdx === 6) dayColor = "text-blue-500";

            dateEl.innerHTML = `<span class="text-slate-400">${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')}.</span> <span class="${dayColor} font-bold">(${weekDays[dayIdx]})</span>`;
            
            timeEl.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            if (now.getSeconds() === 0) render(); 
        }, 1000);
    }

    function timeToMin(timeStr) {
        if(!timeStr || !timeStr.includes(':')) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getBusinessStatus(store) {
        const t = i18n[window.currentLang]; 
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const nowDay = now.getDay();
        const prevDay = (nowDay + 6) % 7; 

        const todaySched = store.weekly[nowDay];
        const prevSched = store.weekly[prevDay];

        // 1. 체크: 전날부터 이어진 심야 영업
        if (prevSched && !prevSched.isOff) {
            const prevSessions = (prevSched.sessions || []).filter(s => s.open !== s.close);
            for (let s of prevSessions) {
                let open = timeToMin(s.open);
                let close = timeToMin(s.close);
                if (close <= open && curMin < close) {
                    const lbl = getLabel(s.label);
                    return { label: t.open, class: "status-open", next: `${lbl ? lbl + ' ' : ''}${s.close} ${t.closeAt}` };
                }
            }
        }

        // 💡 [스마트 휴무일 계산기] 다음으로 가장 빨리 오픈하는 요일과 시간을 계산합니다.
        const getNextOpenText = () => {
            for (let offset = 0; offset <= 7; offset++) {
                let checkDay = (nowDay + offset) % 7;
                let sched = store.weekly[checkDay];
                if (!sched || sched.isOff) continue;
                let validSessions = (sched.sessions || []).filter(s => s.open !== s.close).sort((a, b) => timeToMin(a.open) - timeToMin(b.open));
                
                for (let s of validSessions) {
                    let openMin = timeToMin(s.open);
                    if (offset === 0 && openMin > curMin) {
                        return `${s.open} ${t.openAt}`; 
                    } else if (offset > 0) {
                        // 내일이면 '내일', 그 외의 요일이면 해당 요일(예: '수요일')을 붙입니다.
                        let dayPrefix = offset === 1 ? t.tmrw : t.days[checkDay];
                        return `${dayPrefix} ${s.open} ${t.openAt}`; 
                    }
                }
            }
            return t.needSetup;
        };

        if (!todaySched || todaySched.isOff) return { label: t.off, class: "status-off", next: getNextOpenText() };
        
        const sessions = (todaySched.sessions || []).filter(s => s.open !== s.close).sort((a, b) => timeToMin(a.open) - timeToMin(b.open));
        if (sessions.length === 0) return { label: t.noInfo, class: "status-closed", next: t.needSetup };

        // 2. 당일 현재 영업 중인지 체크
        for (let i = 0; i < sessions.length; i++) {
            let open = timeToMin(sessions[i].open);
            let close = timeToMin(sessions[i].close);
            let actualClose = close <= open ? close + 1440 : close; 
            
            if (curMin >= open && curMin < actualClose) {
                if (sessions[i].open === '00:00' && sessions[i].close === '24:00') {
                    return { label: t.open, class: "status-open", next: t.hours24 };
                }
                const lbl = getLabel(sessions[i].label);
                return { label: t.open, class: "status-open", next: `${lbl ? lbl + ' ' : ''}${sessions[i].close} ${t.closeAt}` };
            }
        }

        // 3. 아직 첫 세션 전 (오픈 전)
        let firstOpen = timeToMin(sessions[0].open);
        if (curMin < firstOpen) {
            return { label: t.ready, class: "status-break", next: `${sessions[0].open} ${t.openAt}` };
        }

        // 4. 브레이크 타임인지 체크
        for (let i = 0; i < sessions.length - 1; i++) {
            let currentClose = timeToMin(sessions[i].close);
            let nextOpen = timeToMin(sessions[i+1].open);
            
            if (currentClose <= timeToMin(sessions[i].open)) currentClose += 1440; 
            
            if (curMin >= currentClose && curMin < nextOpen) {
                return { label: t.break, class: "status-break", next: `${sessions[i+1].open} ${t.reopenAt}` };
            }
        }

        // 5. 그 외 당일 영업 종료인 경우 (내일이나 며칠 뒤 오픈 시간 탐색)
        return { label: t.closed, class: "status-closed", next: getNextOpenText() };
    }

                        </div>

                        <div class="flex items-center gap-1" onclick="event.stopPropagation()">
                            <select class="p-1.5 border rounded-lg text-[9px] bg-white w-14 font-bold text-gray-500" onchange="window.updateStoreField(${sIdx}, 'rsvType', this.value)">
                                <option value="rsv" ${rsvType === 'rsv' ? 'selected' : ''}>예약</option>
                                <option value="inquiry" ${rsvType === 'inquiry' ? 'selected' : ''}>문의</option>
                            </select>
                            <input type="tel" class="flex-1 p-1.5 border rounded-lg text-[9px] bg-white" value="${storePhone}" onchange="window.updateStoreField(${sIdx}, 'phone', this.value)" placeholder="전화번호 (예: 010-1234-5678)">
                        </div>

                        <div class="flex overflow-x-auto gap-1 pb-1 hide-scrollbar">
                            ${weekDays.map((d, i) => `<div class="day-tab ${window.editingDay == i ? 'active' : ''}" onclick="window.changeDay(${i});event.stopPropagation();">${d}</div>`).join('')}
                        </div>
                        
                        <div class="space-y-2 p-2 bg-slate-50 rounded-xl border border-slate-200">
                            <label class="flex items-center gap-1 cursor-pointer" onclick="event.stopPropagation()">
                                <input type="checkbox" onchange="window.updateWeekly(${sIdx}, ${window.editingDay}, 'isOff', this.checked)" ${sched.isOff ? 'checked' : ''}>
                                <span class="text-[10px] font-bold text-red-500">이 요일 휴무</span>
                            </label>
                            <div class="${sched.isOff ? 'opacity-30 pointer-events-none' : ''}">
                                ${(sched.sessions || []).map((sess, sessIdx) => `
                                    <div class="grid grid-cols-3 gap-1 pb-1.5 border-b border-slate-100 last:border-0" onclick="event.stopPropagation()">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.label}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'label', this.value)" placeholder="세션(예: lunch)">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.open}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'open', this.value)">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.close}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'close', this.value)">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="space-y-1 bg-slate-50 p-2 rounded-xl border border-slate-200">
                            <p class="text-[9px] font-bold text-slate-500 mb-1">언어별 접속 링크 세팅</p>
                            ${['ko', 'en', 'zh-CN', 'zh-TW', 'ja'].map(l => `
                                <div class="flex items-center gap-1">
                                    <span class="w-8 text-[8px] text-gray-500 font-bold">${langLabels[l]}</span>
                                    <input type="text" class="flex-1 p-1.5 border rounded-lg text-[9px] bg-white" value="${store.urls?.[l] || (l==='ko' ? store.url : '')}" onchange="window.updateStoreUrl(${sIdx}, '${l}', this.value)" placeholder="${langLabels[l]} 전용 링크" onclick="event.stopPropagation()">
                                </div>
                            `).join('')}
                        </div>
                        
                        <input type="text" class="w-full p-1.5 border rounded-lg text-[9px]" value="${store.img}" onchange="window.updateStoreField(${sIdx}, 'img', this.value)" placeholder="썸네일 이미지 주소" onclick="event.stopPropagation()">
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.changeLang = (lang) => { 
        window.currentLang = lang; 
        
        const floatingBackText = document.getElementById('floating-back-text');
        if(floatingBackText) floatingBackText.innerText = i18n[lang].backToMenu;
        
        render(); 
    };
    
    window.changeDay = (day) => { window.editingDay = day; render(); };
    window.updateWeekly = (sIdx, day, field, value) => { window.stores[sIdx].weekly[day][field] = value; if(window.saveToCloud) window.saveToCloud(); };
    window.updateSession = (sIdx, day, sessIdx, field, value) => { window.stores[sIdx].weekly[day].sessions[sessIdx][field] = value; if(window.saveToCloud) window.saveToCloud(); };
    window.updateStoreField = (sIdx, field, value) => { window.stores[sIdx][field] = value; if(window.saveToCloud) window.saveToCloud(); };
    window.updateStoreUrl = (sIdx, lang, value) => {
        if(!window.stores[sIdx].urls) window.stores[sIdx].urls = {};
        window.stores[sIdx].urls[lang] = value;
        if(lang === 'ko') window.stores[sIdx].url = value; 
        if(window.saveToCloud) window.saveToCloud();
    };

    window.unlockAdmin = () => {
        if (window.isAdmin) { window.isAdmin=false; window.isEditMode=false; document.getElementById('edit-toggle').classList.add('hidden'); render(); }
        else { document.getElementById('pwd-modal').classList.remove('hidden'); document.getElementById('admin-pwd').focus(); }
    };

    window.verifyAdmin = () => {
        if (document.getElementById('admin-pwd').value === ADMIN_PASSWORD) { window.isAdmin=true; document.getElementById('edit-toggle').classList.remove('hidden'); window.closePwdModal(); render(); }
        else alert("틀렸습니다.");
    };

    window.closePwdModal = () => { document.getElementById('pwd-modal').classList.add('hidden'); document.getElementById('admin-pwd').value = ''; };
    window.toggleEditMode = () => { window.isEditMode=!window.isEditMode; render(); };

    window.hideViewerHeader = () => {
        document.getElementById('viewer-header').style.display = 'none';
        document.getElementById('floating-back-btn').classList.remove('hidden');
    };

    window.openLink = (url, title, themeColor, phone, rsvType) => {
        let targetUrl = url;
        
        // --- 1. 디바이스 체크 로직 (모바일 폰 vs 태블릿/PC 분리) ---
        const ua = navigator.userAgent;
        const isPad = /iPad/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isPhone = /iPhone|iPod/i.test(ua) || (/Android/i.test(ua) && /Mobile/i.test(ua));
        
        window.currentOpenUrl = targetUrl;
        const isPdf = targetUrl.toLowerCase().endsWith('.pdf') || targetUrl.includes('drive.google.com');
        
        if (isPdf) {
            const link = document.createElement('a');
            link.href = targetUrl;
            link.target = '_blank'; 
            link.rel = 'noopener noreferrer';
            document.body.appendChild(link);
            link.click(); 
            document.body.removeChild(link);
            return; 
        }
        
        const header = document.getElementById('viewer-header');
        const titleEl = document.getElementById('viewer-title');
        const backBtn = document.getElementById('back-btn');
        const rsvBtn = document.getElementById('rsv-btn'); 
        
        if (rsvBtn) {
            const typeStr = rsvType === 'inquiry' ? 'inquiry' : 'rsv';
            rsvBtn.innerText = i18n[window.currentLang][typeStr];
            if (phone) {
                rsvBtn.style.display = 'block';
                rsvBtn.onclick = () => window.location.href = `tel:${phone}`;
            } else {
                rsvBtn.style.display = 'none'; 
            }
        }
        
        if (!isPdf && themeColor && themeColor !== '#ffffff') {
            header.style.backgroundColor = themeColor;
            header.style.borderBottomColor = themeColor;
            titleEl.style.color = '#ffffff'; 
            backBtn.className = "flex items-center gap-1.5 px-3 py-2 bg-white/20 text-white rounded-xl font-bold text-xs backdrop-blur-sm";
        } else {
            header.style.backgroundColor = '#ffffff';
            header.style.borderBottomColor = '#e2e8f0'; 
            titleEl.style.color = '#334155'; 
            backBtn.className = "flex items-center gap-1.5 px-3 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs";
        }

        // --- 2. 스마트폰일 때만 상단 배너를 화면 위에 오버레이하여 가립니다 ---
        if (isPhone) {
            header.classList.add('absolute');
            header.classList.remove('relative');
        } else { // 태블릿과 PC는 가리지 않고 분리
            header.classList.add('relative');
            header.classList.remove('absolute');
        }

        document.getElementById('iframe-container').style.display = 'flex'; 
        document.getElementById('content-iframe').src = targetUrl;
        titleEl.innerText = title;
        document.body.style.overflow = 'hidden';

        if (isPdf) {
            window.hideViewerHeader();
        } else {
            header.style.display = 'flex';
            document.getElementById('floating-back-btn').classList.add('hidden');
        }
    };

    window.goBack = () => { 
        document.getElementById('content-iframe').src = ''; 
        document.getElementById('iframe-container').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
        
        document.getElementById('viewer-header').style.display = 'flex';
        document.getElementById('floating-back-btn').classList.add('hidden');
    };

    init();
</script>

</body>
</html>
